BACKUP_ROOT=/srv/backups
DOCKER_DIR=/srv/docker
MYSQL_CONTAINER=mysql
# Optional: Logverzeichnis fuer Lauf- und Fehlerprotokolle
# Standard ohne Angabe: <projekt-root>/log
# LOG_DIR=/srv/restic/log

# Diese Listen beeinflussen nur das Stoppen/Starten von Compose-Stacks
# waehrend des Backups.
# Sie schliessen keine Daten vom Dateibackup aus.
# Das Backup kopiert weiterhin den gesamten Inhalt von DOCKER_DIR.
EXCLUDED_STACK_DIRS=(
  "/srv/docker/infrastructure/gotify"
  "/srv/docker/apps/immich-app"
  "/srv/docker/nextcloud"
  "/srv/docker/apps/vaultwarden"
)

MYSQL_INSTANCES=(
  "mysql:backup:PROD_DB_PASSWORD:3306" # PROD_DB_PASSWORD in .env definieren
  "nextcloud:nextcloud:NEXTCLOUD_DB_PASSWORD"
#  "mysql-dev:root:rootpass"                 # Klartext weiterhin moeglich
#  "mysql-legacy"                            # Nutzt Standardwerte
)

EXCLUDED_CONTAINER_NAMES=(
  "stirlingpdf-stirling-pdf-1"
  "ntp"
  "gotify"
  "caddy"
  "ctop"
  "watchtower"
  "ntp"
  "excalidraw"
  "nextcloud-app"
  "nextcloud-cron"
  "nextcloud-db"
  "nextcloud-redis"

)
RESTIC_TAG=docker-backup
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=6

# rclone-Remote-Name fuer Internxt-Sync
INTERNXT_RCLONE_REMOTE="internxt-webdav"

# Nextcloud-spezifisch
NEXTCLOUD_APP_CONTAINER="nextcloud-app"
NEXTCLOUD_DB_CONTAINER="nextcloud-db"
NEXTCLOUD_DB_USER="${MYSQL_USER}"
NEXTCLOUD_DB_PASSWORD="${MYSQL_PASSWORD}"
NEXTCLOUD_DB_NAME="${MYSQL_DATABASE}"
NEXTCLOUD_DATA_DIR="/srv/docker/app/nextcloud/data/nextcloud"